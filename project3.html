<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="project3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
        <div class="container">
                    <div class="heading">
                        <h1>Weather App</h1>
                    </div>
                    <div class="paragraph">
                        <p>Enter the city name</p>
                    </div>
                    <div class="input_field">
                        <input name="100" type="text">
                    </div>
                    <div class="button-field">
                        <button><i class="fa fa-search"></i></button>
                    </div>
                    <div class="elements">

                        <div class="temperature-block">
                            <i class="fa-solid fa-temperature-high"></i>
                            <p class="temperature-showcase"></p>
                        </div>

                        <div class="temperaturefeelslike-block">
                            <i class="fa-solid fa-temperature-three-quarters"></i>
                            <p class="temperaturefeelslike-showcase"></p>
                        </div>

                        <div class="weather-block">
                            <i class="fa-solid fa-cloud-sun"></i>
                            <p class="wheather-showcase"></p>
                        </div>

                        <div class="humidity-block">
                            <i class="fa-solid fa-cloud-sun"></i>
                            <p class="humidity-showcase"></p>
                        </div>

                        <div class="wind-block">
                            <i class="fa-solid fa-wind"></i>
                            <p class="wind-showcase"></p>
                        </div>

                        <div class="pressure-block">
                            <i class="fa-solid fa-gauge"></i>
                            <p class="pressure-showcase"></p>
                        </div>

                        <div class="visibility-block">
                            <i class="fa-solid fa-eye"></i>
                            <p class="visibility-showcase"></p>
                        </div>

                        <div class="sunrise-block">
                            <i class="fa-solid fa-sun"></i>
                            <p class="sunrise-showcase"></p>
                        </div>

                        <div class="sunset-block">
                            <i class="fa-solid fa-moon"></i>
                            <p class="sunset-showcase"></p>
                        </div>

                        <div class="uv-block">
                            <i class="fa-solid fa-sun"></i>
                            <p class="uv-showcase"></p>
                        </div>

                    </div>

                        <div class="dateandtime-block">
                            <p class="time"></p>
                        </div>

                        <div class="dateandtime-block">
                            <p class="date"></p>
                        </div>
                        
        </div>
    <script src="project3.js"></script>
</body>
</html>
